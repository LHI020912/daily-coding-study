<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>태그 선택자</title>
		<script src="jquery-3.7.1.min.js"></script>
		<script type="text/javascript">
			$(function(){
				//css('style','value'):객체의 style속성을 설정하는 메소드
				$('h1').css('style','red');
				$('h1').css('background','black');
				//메소드 체인방식
				$('h1').css('width','50%').css('height','40px');
			});
		</script>
	</head>
	<body>
		<h1 id='h1'>Header</h1>
		<h1 id='h2'>Header</h1>
		<h1>Header</h1>
		
	</body>
</html>
