<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>
		<script src="jquery-3.7.1.min.js"></script>
		<!-- jQuery CDN 방식 전달 -->
		<script type="text/javascript">	
		//객체.attr(): style속성이 아닌 태그의 다른속성을 설정하거나 설정된 속성을 추출할 때 사용
		//속성지정
		$(function(){
			$('img').attr({
				alt:'jQuery라이브러리 사용 속성 지정',
				src:'image/painting.jpg',
				width:100
			});
		})
		</script>
	</head>
	<body>
		<img>
		<img>
		<img>
	</body>
</html>
