<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>
		<style>
			*{margin:0 auto; text-align:center;}
			table, tr, td {
				border:solid 2px gray;
				border-collapse:collapse;
				}
			th{color:white;background:#036;}
			h1{padding:15px;}
		</style>
		<script src="jquery-3.7.1.min.js"></script>
		<script type="text/javascript">	
		$(function(){
			//class item 중에 합산
			$('.item').on('change',function(){
				let total = 4500000;
				//select
				let choice = parseInt($('#choice').val());
				total += choice;
				//checkbox
				$(':checkbox:checked').each(function(){
					total += parseInt($(this).val());
				});
				//total
				$('#price').text(total.toLocaleString()+'원');
			});
		});
		</script>
	</head>
	<body>
		<h1>카메라 주문서</h1>
		<table>
			<tr><td colspan=3><img src="image/camera.jpg"></td></tr>
			<tr><th>기본 가격</th>		<td colspan=2>4,500,000원</td></tr>
			<tr><th>기본 옵션</th>		<td colspan=2><select id="choice" class="item">
									<option value="0">선택하세요.</option>
									<option value="100000">삼각대 100,000원</option>
									<option value="50000">차량용 충전기 50,000원</option>
									</select></td></tr>
			<tr><th>선택 옵션</th>  <th>가격</th>	<th>선택</th></tr>
			<tr><td>렌즈 필터</td><td>30,000원</td>	<td><input type="checkbox" class="item" value="30000"></td></tr>
			<tr><td>DSLR 가방</td><td>40,000원</td><td><input type="checkbox" class="item" value="40000"></td></tr>
			<tr><td>청소도구</td><td>7,000원</td><td><input type="checkbox" class="item" value="7000"></td></tr>
			<tr><th>주문액</th><td id="price" colspan=2>4,500,000원</td></tr>
		</table>
	</body>
</html>
