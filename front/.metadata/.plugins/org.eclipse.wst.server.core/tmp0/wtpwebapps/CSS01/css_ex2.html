<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
	h1{
		display:inline-block;
		background:black;
		color:white;
	}
	ul{list-style:none;}
	li{display:inline; margin-right:30px; color:blue;}
	li:nth-child(2) {color:red;}
	li:nth-child(3) {color:green;}
</style>
</head>
<body>
<h1>웹 기술 - 기본</h1>
<ul>
	<li>HTML</li>
	<li>CSS</li>
	<li>Javascript 기초</li>
</ul>
</body>
</html>
