<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>inlineBlock 예제</title>
	<style type="text/css"> 
	/* display 속성이 없으면 기본값 : block(행배치 내부 여백)*/
	.greenBox {
		/*display:block;*/
		/* inline: 옆으로 나란히 배치, 내부 여백 없이 내용만큼 공간 차지,
		width+height 적용되지 않는다.*/
		float:right;
		width:150px;
		height:75px;
		margin:10px;
		border:solid 3px #73AD21;
	}
	</style>
</head>
<body>

</body>
	<h2>display 속성 (block / inline / inline-block)</h2>

    <div class="greenBox">박스 1</div>
    <div class="greenBox">박스 2</div>
    <div class="greenBox">박스 3</div>
    <div class="greenBox">박스 4</div>  
</html>
