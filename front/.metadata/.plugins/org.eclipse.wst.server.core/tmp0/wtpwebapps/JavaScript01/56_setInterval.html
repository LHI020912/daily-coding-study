<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
        <title>setInterval() 예제</title>
		<script type="text/javascript">
			function showTime(){//시계			
				let now = new Date();
			
				let hour = now.getHours(); //24시간제로반환
				let minute = now.getMinutes();
				let second = now.getSeconds();
				let amPm="오전";
				
				if(hour ==24)
					hour -=24;
				else if(hour >= 12)
					amPm = "오후";
					if(hour > 12)
						hour -= 12; //오전 오후의 규칙
				
				let time = amPm + " " + hour + "시 " + minute + "분 " + second + "초 ";
				timeShow.innerHTML = time;//html안에 동적인 거 넣기 시점에 해당되는 염려가있음
				
			}
			//showTime();
			
		</script>
	</head>		
	<body>
		<!-- setInterval()은 콜백함수를 특정 간격으로 계속 호출하므로 호출 먼추기 위해서는
		 clearInterval()사용 - 특정 interval 설정 해지위해 id가 필요
		 setInterval() 호출되면 객체 id값을 반환-->
					<!-- 콜백으로 함수가 넘어감 -->
       <button onClick="timerId=setInterval('showTime()',1000)">시간 출력</button>
       <button onClick="clearInterval(timerId)">시간 정지</button> 
       <h1 id="timeShow">시간 출력</h1> <!-- 정적인 h1안에 동적을 넣을거임! -->	   	
	</body>
</html>
