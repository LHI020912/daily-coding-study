<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
        <title>함수 예제</title>
        <script type="text/javascript">
			 //함수선언형식
			 //1. 일반적인 함수 선언
			 function show(){
				 //코드를 나열
				 alert("경고입니다!!");
			 }
			 //함수 실행 시점 - 호출되는 시점에 함수실행
			 show();
			 
			 (function(){
				 alert("함수 호출 없이도 자동실행!");
			 })();
			 
			 show();
        </script>
    </head>
    <body>
    </body>
</html>
