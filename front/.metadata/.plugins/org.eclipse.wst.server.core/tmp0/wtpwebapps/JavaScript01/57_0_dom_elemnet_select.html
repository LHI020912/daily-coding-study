<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>
		<script type="text/javascript">	
		//let box = document.getElementById('box');
		//dom객체 하위 요소에서 id 값이 box인 요소객체 반환
		//dom요소가 해석되지 않은 상황에서getElementById null반환

		//innerHTML를 이용해 태그내부 텍스트수정

		</script>
	</head>
	<body>
		<div id="box">빡스!</div>
		<!-- 스크립트코드의 위치에 따라 dom요소 접근이 가능 -->

			let box = document.getElementById('box');
			box.innerHTML="변경"
		</script>
