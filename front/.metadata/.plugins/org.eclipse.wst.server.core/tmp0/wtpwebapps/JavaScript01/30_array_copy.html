<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>
		<script type="text/javascript">	
		/*
		- 깊은복사: 배열의 구조, 원소값을 복사 - 구조 복사는 메모리 할당을 진행
			(배열복사는아님,json객체의 구문 분석 때문에 만들어짐)
		- JSON.stringfy(배열): 배열을 JSON으로 변환
		- JSON.parse(): JSON 구문 분석
		*/
		
		//배열 깊은 복사
		var arr=[1,2,3];
		var arrCopy = JSON.parse(JSON.stringify(arr));

		console.log("원본: ",arr);
		console.log("복사본: ",arrCopy);
		console.log(arr==arrCopy);
		//false반환, 두 변수의 참조값이 다르다, arrCopy가 참조하는 객체가 생성(동일 원소값도 복사)
		
		console.log("변경 후");
		arr[0] = 100;//원본의 원소값 변경
		arrCopy[1]=50;
		console.log("원본: ",arr);
		console.log("복사본: ",arrCopy);
		</script>
	</head>
	<body>
	
	</body>
</html>
