<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>addEventListener()</title>
		<script type="text/javascript">
			window.onload = function() {
				let box = doucment.getLelementById('box');
				/*mousedown이벤트 처리
				이벤트가 발생하면 리스너,핸들러는 발생한 이벤드에대한 정보를 콜백함수로 전달
				전달되는 정보 받아서 처리에 사용하려면 콜백함수에 매개 변수를 설정함
				전달 정보는 이벤트 객체가 전달됨.
				event.currentTarget: 이벤트가 발생한 대상의 참조 값 저장된 속성*/
				box.addEventListener('mousedown',e =>{
					event.currentTarget.style.background='green';
					//event.currentTarget: id가 box인 객체를 반환함 
				});
				
				box.addEventListener('mouseup',e =>{
					event.currentTarget.style.background='white';
				});
			};
			
		</script>
	</head>
	<body>
		<div id="box">클릭</div>
	</body>
</html>
