<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Array 객체</title>
		<script type="text/javascript">
			
			// var fruits = ["사과", "복숭아", "포도"]; // 결과 동일
			let fruits = new Array("사과", "복숭아", "포도");
			let car = new Array("소나타","kB","ev6");
			
			document.write("모든 요소 출력 : ");
			for(let i=0; i<fruits.length;i++)
				document.write(fruits[i]+ " ");
			

			document.write("<br> shift() : 첫 번째 요소 제거 -  ");
			for(var i =0; i<fruits.length; i++){
				fruits.shift();//첫번째 요소 제거
				car.shift();//car변수가 참조하는 배열객체의 메소드 shirt()실행
				document.write(fruits[i] + " ");
			}
			
			fruits.unshift("배");//첫번째 요소 제거
			document.write("<br> unshift() : 맨 앞에 요소(배) 추가 -  ");
			for(var i =0; i<fruits.length; i++){
				document.write(fruits[i] + " ");
			}
			
			fruits.pop();//마지막 요소 제거
			document.write("<br> pop() : 마지막 요소(포도) 제거 -  ");
			for(var i =0; i<fruits.length; i++){
				document.write(fruits[i] + " ");
			}
			
			fruits.push("딸기");//마지막 요소 추가
			fruits.push("수박");
			document.write("<br> push() : 마지막에 요소(딸기, 수박) 추가 -  ");
			for(var i =0; i<fruits.length; i++){
				document.write(fruits[i] + " ");
			}
			
			fruits.reverse();
			document.write("<br> reverse() : 역순으로 변경 -  ");
			for(var i =0; i<fruits.length; i++){
				document.write(fruits[i] + " ");
			}
			
			fruits.sort();
			document.write("<br> sort() : 오름차순 정렬 -  ");
			for(var i =0; i<fruits.length; i++){
				document.write(fruits[i] + " ");
			}
			
			fruits.splice(2,1,"망고","오렌지");
			document.write("<br> splice() : [2]위치 요소 1개(복숭아) 삭제하고  '망고 오렌지' 추가  -  ");
			for(var i =0; i<fruits.length; i++){
				document.write(fruits[i] + " ");
			}
			
			var newFruits = fruits.slice(1,4);//idx 1부터 idx3까지의 요소추출 배열생성 후 반환
			document.write("<br> slice() : [1] ~[3] 요소 추출하여 배열 생성  -  ");
			for(var i =0; i<newFruits.length; i++){
				document.write(newFruits[i] + " ");
			}
			
			//기존 배열 복사해서 새로운 배열 생성(deep copy)
			//1차원 배열인 경우 Array.slice(0,Array.length)이용
			var newfruits2 = frutis.slice(0,Array.length);
			document.write("<br> slice() 활용 1차원 배열 복사  -  ");
			for(var i =0; i<newFruits.length; i++){
				document.write(newFruits[i] + " ");
			}
		</script>
	</head>
	<body>
		
	</body>
</html>
