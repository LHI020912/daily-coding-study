<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<!-- script 태그 위치는 어디든 상관없음 head 부분에 삽입권장
			태그가 여러개면 실행순서는 top-down 방식 -->
<script type="text/javascript">
	alert("head부분에 삽입된 경고입니다.");
</script>
</head>
<body>
<script type="text/javascript">
	alert("body 부분에 삽입된 경고입니다.");
</script>
</body>
</html>
