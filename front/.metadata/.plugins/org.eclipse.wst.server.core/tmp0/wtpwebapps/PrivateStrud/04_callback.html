<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>
		<script type="text/javascript">
		
		//함수 선언
		function callTenTimes(callback){
			// 10회 반복
			for(let i = 0; i < 4; i++){
				callback(i+1); // 매개변수로 전달된 함수 호출
			}
		}
		
		//변수 선언 + 익명함수인 거잖아
		let fun = function(count) {
			alert(`함수호출 ${count}번째`);
		}
		
		//함수 호출
		callTenTimes(fun);
		</script>
	</head>
	<body>
	
	</body>
</html>
