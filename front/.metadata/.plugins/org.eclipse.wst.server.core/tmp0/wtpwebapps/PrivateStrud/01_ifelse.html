<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>사계절 맞추기</title>
		<script type="text/javascript">	
		//변수 선언
		let date = new Date();
		let month = date.getMonth() +1;
		
		//조건문
		if(3 <= month && month <=5)
			alert('봄입니다.');
		else if(6<=month && month <=8)
				alert('여름입니다.');
			else if(9<=month && month <=11)
					alert('가을입니다.');
				else
					alert('겨울입니다.');
		</script>
	</head>
	<body>
	
	</body>
</html>
