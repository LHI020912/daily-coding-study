<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>
		<script type="text/javascript">	
		let star = prompt("별 숫자를 입력해주세요.");
		
		for(let i=0;i<star;i++){
			for(let j=star;j>i; j--){
				document.write("&nbsp");
			}
			for(let j=0;j<=i;j++){
				document.write("☆");
				}
			document.write("<br>");
			}
		</script>
	</head>
	<body>
	
	</body>
</html>
