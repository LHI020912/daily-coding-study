<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>입력 양식 태그</title>
</head>
<body>
<!-- form태그의 action 수행 조건은 submit 이벤트가 발생하면 action이 수행 된다.
	submit 이벤트는 js를 통해 수동으로 발생시킬 수 있으며
	submit 버튼을 통해 이벤트 발생을 대기할 수 있다.
 -->
 	<form method="post" action="newMember.jsp">
 		label 태그 생략<p>
 		성명: <input type="text" id="name" size="20" autofocus><br>
 				<input type="text" id="prbNo" hidden><br>
 				<input type="text" name="id" size="15" placeholder="아이디"><br>
 				<hr>
 		label 태그 사용<p>
 		<label>성명: <input type="text" id="name" size="20"></label><br><br>
 		<label>아이디: <input type="text" id="id" maxlength="8"></label><br><br>
 		<label>우편번호: <input type="text" id="zipcode" value="12345" readonly></label><br><br>
 		<label>주소: <input type="text" id="address" required></label><br><br><hr>
 		<label>비밀번호: <input type="password" id="passwd" size="15"></label><br><br>
 		학년: 
 		<!-- name을 동일하게 설정하여 그룹화(단일화) -->
	 	<label><input type="radio" name="yaer" value="1">1학년 </label>
	 	<label><input type="radio" name="yaer" value="2">2학년 </label>
	 	<label><input type="radio" name="yaer" value="3">3학년 </label>
	 	<label><input type="radio" name="yaer" value="4" checked>4학년 </label><br><br>
	 	취미: 
	 	<label><input type="checkbox" id="game" value="게임" checked> 게임 </label>
	 	<label><input type="checkbox" id="movie" value="영화"> 영화 </label>
	 	<label><input type="checkbox" id="reading" value="독서"> 독서 </label>
	 	<label><input type="checkbox" id="sports" value="운동"> 운동 </label><br><br>
	 	여행하고 싶은 나라:  
	 	<select name="nation">
	 		<option value="미국">미국</option>
	 		<option value="호주" selected>호주</option>
	 		<option value="브라질">브라질</option>
	 		<optgroup label="아시아">
	 			<option value="한국">한국</option>
	 			<option value="중국">중국</option>
	 			<option value="일본">일본</option>
	 		</optgroup>
	 		<option value="기타">기타</option>
	 	</select>
	 	<br><br>자기소개<br>
	 	<textarea rows="10" cols="50" name="content"></textarea><br><br>
		첨부파일 선택: 
		<input type="file" size="30"><br><br>
		<input type="button" value="아이디 중복 확인"><br><br>
		<input type="image" id="orderImg" src="image/cart.jpg"><br><br>
		<label>이메일 <input type="email"></label><br><br>
		<label><input type="submit" value="회원가입"></label>
		<label><input type="reset" value="취소"></label><br><br>
 	</form>
 	<hr>
 	<form method="get" action="search.jsp">
 		<label>주소: <input type="text" id="address" required></label><br><br>
 		여행하고 싶은 나라:  
	 	<select name="nation">
	 		<option value="미국">미국</option>
	 		<option value="호주" selected>호주</option>
	 		<option value="브라질">브라질</option>
	 		<option value="기타">기타</option>
	 	</select><br><br>
		<label><input type="submit" value="회원가입"></label>
		<label><input type="reset" value="취소"></label><br><br>
 	</form>
<br><br>
<button onclick="window.location.href='HelloWorld.html'">메인 페이지 이동</button>
</body>
</html>
