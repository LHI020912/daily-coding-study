<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>가변 그리드</title>
		<style type="text/css">
			#wrap {
				width:90%;
				height:300px;
				margin:0 auto;
				border:4px solid #000;
			}
			
			#wrap div {
				height:100%;
				display:inline-block;
			}
			
			#wrap div:nth-child(1) {
				width:33.3%;
				background:#E1F0E5; 
			}
			#wrap div:nth-child(2) {
				width:66.6%;
				background:pink; 
			}
		</style>
	</head>
	<body>
		<div id="wrap">		
			<div></div><div></div>	
		</div>
	</body>
</html>
