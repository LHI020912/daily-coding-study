<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>
		<script type="text/javascript">	
		function input() {
			var row = Number(prompt("테이블의 형 수 입력: "));
			var col = Number(prompt("테이블의 열 수 입력: "));
			
			makeTable(row,col);
		}
		
		var makeTable = (row,col) => {
			document.write("<table border='1'\>");
			for(i=0; i<row;i++){
				document.write("<tr>");
				for(j=0; j<col;j++){
					document.write("<td> ★ </td>");
				}
				document.write("</tr>");
			}
			document.write("</table>");
		}
		</script>
	</head>
	<body>
	<button onClick="input()">테이블 만들기</button>
	</body>
</html>
