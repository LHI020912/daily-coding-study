<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>
		<script type="text/javascript">	
		//hoisting:선언전에 사용하는 특성
		//자바스크립트 함수: 호이스팅 가능(일반적인 함수 생성 시)
		//호이스팅: 모든 함수형식이 가능한 건 아님
		show();
		//함수선언
		function show(){
			alert("show()함수입니다.")
		}
		//익명함수 호이스팅
		sum(10,20);//sum is not a function
		var sum = function(a,b){
			document.write(a+b+"<br>");
		}
		</script>
	</head>
	<body>
	
	</body>
</html>
