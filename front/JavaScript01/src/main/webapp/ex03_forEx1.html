<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>
		<script type="text/javascript">	
		a = 0;
		b = 0;
		c = 0;
		
		for(i=1;i<=10;i++){
			var num = prompt("숫자 "+i+" 입력 :");
			
			if(num<0){
				a++;
			} else if(num>0){
				b++;
			} else {
				c++;
			}
		}

		document.write("양수의 개수: " +a+ "<br>");
		document.write("음수의 개수: " +b+ "<br>");
		document.write("0의 개수: " +c+ "<br>");
		
		</script>
	</head>
	<body>
	
	</body>
</html>
