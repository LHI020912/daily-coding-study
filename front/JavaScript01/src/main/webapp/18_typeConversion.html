<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>형변환</title>
		<script type="text/javascript">	
			
			var num1 = prompt("숫자1 입력");
			var num2 = prompt("숫자2 입력");
		
			//Number(): 정수,실수 형 변환이 가능
			document.write(Number(num1)+"<br>");
			document.write(parseInt(num1) + parseInt(num2) +"<br>");
			document.write(num1 * num2 );
		</script>
	</head>
	<body>	
	</body>
</html>
