<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
    	<title>함수의 반환 값</title>
        <script type="text/javascript">
		    //숫자 2개를 입력 받아서 두 수의 합을 구하여 반환하는 함수
			function input() {
		    	let num1 = Number(prompt("숫자 1 입력"));
		    	let num2 = Number(prompt("숫자 2 입력"));
				return num1+num2;//함수를 종료시키고 호출한곳으로 반환(반환값X시 정해진 기본값 반환)
			}
			
			document.write("합계 : " + input());
		</script>
    </head>
    
    <body>
    </body>
</html>
