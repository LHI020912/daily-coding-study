		//배열을 이용
		var score = new Array ("국어","영어","수학");
		
		function start(){
			answer = confirm("성적을 입력하시겠습니까?");
			
			if (answer){
				alert("평균 : " + input());
			}else{
				document.write("종료합니다.");
			}
		}
		
		function input(){
			var total=0;
			for(var i in score){
			 total += Number(prompt(score[i]+" 점수 입력 : "));
			}
			return total/3;
		}
		</script>

	<body>
	<button onClick="start()">성적 입력</button>
