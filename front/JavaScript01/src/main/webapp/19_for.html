<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
        <title>for문</title>    
        <script type="text/javascript">
   	 			 sum = 0;
   	 			 
                 for(var i=0; i<=10; i++){
                	 document.write("i= "+ i +"<br>");
                	 sum += i;
                 }
				 
                 document.write("sum = " + sum);//1~10까지 더한 결과값 출력	 
				 
     </script> 
     </head>    
     <body>   	  
     </body>
 </html>
