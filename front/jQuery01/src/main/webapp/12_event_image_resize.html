<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>윈도우 이벤트 : 이미지 크기 동적 변경</title>
		<script src="jquery-3.7.1.min.js"></script>
		<style>
			* {margin:0;}
			img { width:100%;}
		</style>
		<script type="text/javascript">
			$(document).ready(function() {
				//resize 이벤트 발생하면 윈도우 크기에 맞음
				$(window).on('resize',function(){
					let w = $(window).width();
					 
					if(w>=1200)
						$('#topImg').css('width','50%');
					else if(w>=768)
						$('#topImg').css('width','70%');
					else
						$('#topImg').css('width','100%');
				}).resize();
			});
		</script>
	</head>
	<body>
		<div id="topImgBox"><img src="image/topImg.jpg" id="topImg"></div>
	</body>
</html>
