<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>동적 연결 이벤트 방식</title>
		<script src="jquery-3.7.1.min.js"></script>
		<script type="text/javascript">
			$(document).ready(function() {
				// createBtn 버튼 클릭했을 때
				$('#create').on('click',function(){
					$(this).after("<p><input type='button' id='newBtn' value='새버튼1'</p>"+
								  "<p><input type='button' id='newBtn' value='새버튼2'</p>"
					)
				})
				// 버튼 이벤트 처리
				// (1) 동적 연결 방식 아님
				//이벤트 등록 시점이 $(document).ready이벤트 발생한 이후에 바로 등록
				//#newBtn1 생성되는 시점: 새버튼 만들기 클릭했을 때임
				//객체가 없음 - 이벤트등록 붉가
				$('#newBtn1').on('click',function(){
					alert("[새버튼 1 ]클릭했습니다.");
				});
				// (2) 동적 연결 방식
				$(document).on('click',function(){
					alert("[새버튼 2 ]클릭했습니다.");
				});
			});
		</script>
	</head>
	<body>
		<button id="createBtn">새 버튼 만들기2</button>
	</body>
</html>
