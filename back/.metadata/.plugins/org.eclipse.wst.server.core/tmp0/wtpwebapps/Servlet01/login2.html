<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>파라미터 연습3</title>
<script type="text/javascript">
	// 자바 스크립트로 서블릿에 요청
	// DOM 사용
	window.onload = function(){
		let formLogin = document.getElementById("formLogin");
		
		formLogin.addEventListener('submit',()=>{
			let id = document.getElementById("user_id");
			let pw = document.getElementById("user_pw");
			
			if(id.value==""||pw.value==""){
				alert("아이디와 비밀번호는 필수입니다.")
			}else{
				formLogin.method="post";
				formLogin.method="login3";
				formLogin.submin();
			}
		});
	}// onload 끝
</script>
</head>
<body>
	<form name="formLogin" id="formLogin">
		아이디: <input type="text" id="user_id" name="user_id">
		비밀번호: <input type="password" id="user_pw" name="user_pw">
		<input type="button" value="로그인"><input type="reset" value="초기화">
	</form>
</body>
</html>
